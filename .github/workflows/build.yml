name: Build telegram-bot-api Binaries

# Triggers:
#   - Manually via "Run workflow" button with a release tag
#   - Automatically when a tag matching tgapi-v* is pushed
#
# Produces binaries for linux-amd64, linux-arm64, linux-armv7.
# Strategy: QEMU user-mode emulation via docker/setup-qemu-action +
# `docker run --platform linux/<arch> ubuntu:20.04`.  Each architecture
# compiles natively inside its own ubuntu:20.04 container — no cross-
# compilation toolchain required.  glibc 2.31 guaranteed (ubuntu 20.04).
# All three builds run in parallel; arm64/armv7 take ~60 min under QEMU.

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to create (e.g. tgapi-v1.0.0)'
        required: true
        default: 'tgapi-v1.0.0'
  push:
    tags:
      - 'tgapi-v*'

permissions:
  contents: write   # required to create a GitHub Release

jobs:
  # ── Build stage ─────────────────────────────────────────────────────────────
  # Three parallel jobs, each building natively inside a platform-specific
  # ubuntu:20.04 Docker container via QEMU binfmt_misc emulation.
  build:
    name: Build (${{ matrix.target }})
    # Runs directly on ubuntu-22.04 (no container:). The actual compilation
    # happens inside `docker run --platform linux/<arch> ubuntu:20.04`, which
    # uses QEMU user-mode emulation registered by setup-qemu-action.
    # This gives us:
    #   - glibc 2.31 (ubuntu 20.04) — compatible with Armbian/RPi OS Buster
    #   - Native compilation per arch — no cross-compilation toolchain needed
    #   - Identical build environment for all three platforms
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            platform: linux/amd64

          - target: linux-arm64
            platform: linux/arm64

          - target: linux-armv7
            platform: linux/arm/v7

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Register QEMU binfmt_misc handlers so `docker run --platform linux/arm64`
      # transparently runs ARM64 binaries on the x86_64 runner.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,arm

      # ── Source checkout ────────────────────────────────────────────────────
      - name: Clone telegram-bot-api source
        run: |
          git clone --depth 1 --recurse-submodules --shallow-submodules \
            https://github.com/tdlib/telegram-bot-api.git /tmp/tg-src
          echo "Upstream commit: $(git -C /tmp/tg-src rev-parse --short HEAD)"

      # ── Compile inside platform-specific ubuntu:20.04 container ───────────
      # The --platform flag selects the target arch; Docker pulls the matching
      # manifest and routes execution through QEMU on non-native platforms.
      # Everything compiles natively from the ARM OS's perspective — no
      # toolchain file, no cross-compiler, no include-path surprises.
      - name: Build
        run: |
          mkdir -p /tmp/tg-output
          docker run --rm \
            --platform ${{ matrix.platform }} \
            -v /tmp/tg-src:/src \
            -v /tmp/tg-output:/out \
            ubuntu:20.04 \
            bash -xc "
              export DEBIAN_FRONTEND=noninteractive TZ=UTC
              apt-get update -qq
              apt-get install -y cmake g++ libssl-dev zlib1g-dev gperf make
              cmake -S /src -B /tmp/build -DCMAKE_BUILD_TYPE=Release
              cmake --build /tmp/build --target telegram-bot-api --parallel \$(nproc)
              strip /tmp/build/telegram-bot-api -o /out/telegram-bot-api-${{ matrix.target }}
            "

      # ── Verify and stage ───────────────────────────────────────────────────
      - name: Verify binary
        run: |
          DST=/tmp/tg-output/telegram-bot-api-${{ matrix.target }}
          echo "--- Binary info ---"
          file "$DST"
          ls -lh "$DST"

      # ── Upload artifact ────────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: telegram-bot-api-${{ matrix.target }}
          path: /tmp/tg-output/telegram-bot-api-${{ matrix.target }}
          retention-days: 30

  # ── Release stage ────────────────────────────────────────────────────────────
  # Waits for all three builds to succeed, then publishes a GitHub Release
  # with all three binaries attached.
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/release-artifacts
          merge-multiple: true

      - name: Resolve release tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.release_tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"

      - name: List release artifacts
        run: ls -lh /tmp/release-artifacts/

      - name: Write release notes
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          cat > /tmp/release-notes.md << 'ENDNOTES'
          ## Pre-built telegram-bot-api binaries

          Built from [tdlib/telegram-bot-api](https://github.com/tdlib/telegram-bot-api).
          Each binary compiled natively inside a matching ubuntu:20.04 Docker
          container via QEMU — glibc 2.31, no cross-compiler patches needed.

          | Binary | Architecture | Target devices |
          |--------|-------------|----------------|
          | `telegram-bot-api-linux-amd64` | x86_64 | Servers, PCs |
          | `telegram-bot-api-linux-arm64` | aarch64 | Raspberry Pi 4+, Radxa Cubie A7Z, Orange Pi 5 |
          | `telegram-bot-api-linux-armv7` | armv7l | Raspberry Pi 2/3 (32-bit OS), older SBCs |

          ### AiHomeCloud automatic install

          When you enable **2 GB Telegram mode** in AiHomeCloud, the app automatically
          downloads the correct binary for your device — no manual installation needed.

          ### Manual install

          ```bash
          curl -fsSL https://raw.githubusercontent.com/$REPO/main/scripts/install.sh | sudo bash
          ```
          ENDNOTES
          # Replace the $REPO placeholder (heredoc prevents shell expansion)
          sed -i "s|\$REPO|${REPO}|g" /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --title "telegram-bot-api binaries ${TAG}" \
            --notes-file /tmp/release-notes.md \
            /tmp/release-artifacts/*
