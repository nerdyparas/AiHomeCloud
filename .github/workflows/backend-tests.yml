name: Backend Tests

on:
  push:
    paths:
      - 'backend/**'
      - 'scripts/**'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    paths:
      - 'backend/**'
      - 'scripts/**'

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install bandit pip-audit pytest-cov

      - name: Run bandit (HIGH severity)
        run: bandit -r backend/app -ll

      - name: Run pip-audit
        run: pip-audit --requirement backend/requirements.txt

      - name: Check shell script syntax
        run: bash -n scripts/first-boot-setup.sh

      - name: Run backend tests with coverage
        working-directory: backend
        env:
          PYTHONPATH: .
          AHC_DATA_DIR: ${{ runner.temp }}/ahc_test_data
          AHC_NAS_ROOT: ${{ runner.temp }}/ahc_test_nas
        run: |
          pytest --cov=app --cov-report=xml:coverage.xml --cov-fail-under=65 -q tests --ignore=tests/test_hardware_integration.py

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml
